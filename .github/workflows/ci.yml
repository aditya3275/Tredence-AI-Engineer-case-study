name: Model Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Build and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Validating across multiple versions to ensure PEP 517 compatibility
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Build Tools & Project
        # Explicitly installing setuptools and wheel resolves the BackendUnavailable error
        # by ensuring the PEP 517 build-backend is available in the environment.
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools>=68.0 wheel
          pip install -e ".[dev]"

      - name: Run Logic Tests (Pytest)
        # Verifies the PrunableLinear logic and AdaptiveLambdaController arithmetic
        run: pytest -v

      - name: Check Formatting (Black)
        # Enforces zero-tolerance for inconsistent formatting
        run: black --check src/

      - name: Check Import Sorting (isort)
        # Ensures clean, categorized import blocks
        run: isort --check src/