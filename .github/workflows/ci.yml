name: Model Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Build and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Testing on multiple versions ensures the code is robust
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Build Tools & Project
        # We explicitly install setuptools and wheel to resolve the BackendUnavailable error.
        # This ensures the build-backend is ready for the editable install (-e .).
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools>=68.0 wheel
          pip install -e ".[dev]"

      - name: Run Logic Tests (Pytest)
        run: pytest -v

      - name: Check Formatting (Black)
        run: black --check src/

      - name: Check Import Sorting (isort)
        run: isort --check src/