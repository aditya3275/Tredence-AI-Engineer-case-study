name: Model Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Build and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Testing on multiple versions ensures the code is robust
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install Project & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Logic Tests (Pytest)
        # Ensures PrunableLinear and PrunableNetwork logic remains sound
        run: pytest -v

      - name: Check Formatting (Black)
        # Fails the build if the code is not formatted correctly
        run: black --check src/

      - name: Check Import Sorting (isort)
        # Fails the build if imports are messy
        run: isort --check src/